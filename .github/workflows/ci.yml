name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ['20', '22', '24']
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        if: matrix.node-version == '22'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Biome check
        run: npx @biomejs/biome ci .

  validate-grit:
    name: Validate GritQL rules
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check GritQL files exist and are non-empty
        run: |
          failed=0
          for f in rules/**/*.grit; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              failed=1
            elif [ ! -s "$f" ]; then
              echo "EMPTY: $f"
              failed=1
            else
              echo "OK: $f"
            fi
          done
          exit $failed

      - name: Verify rule count matches plugin manifest
        run: |
          grit_count=$(find rules -name '*.grit' | wc -l | tr -d ' ')
          manifest_count=$(node -e "const p=JSON.parse(require('fs').readFileSync('biome-plugin.json','utf8')); console.log(p.rules.length)")
          echo "GritQL files: $grit_count"
          echo "Manifest entries: $manifest_count"
          if [ "$grit_count" != "$manifest_count" ]; then
            echo "ERROR: mismatch between .grit files ($grit_count) and biome-plugin.json entries ($manifest_count)"
            exit 1
          fi
